name: Deploy

on:
  push:
    branches:
    - arrow

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Build lambda function
      run: |
        ./gradlew clean buildLambda -DarrowVersion=0.11.0 # TODO
        ls -ltrh lambdaDistributions
    - name: Copy
      env:
        S3_BUCKET: ${{ secrets.S3_BUCKET }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_CLOUDFRONT_ID: ${{ secrets.AWS_CLOUDFRONT_ID }}
      run: |
        aws s3 cp lambdaDistributions/*.zip s3://$S3_BUCKET/kotlin-compiler-server/
        # TODO: my-function and hard-coded version
        # aws lambda update-function-code --function-name my-function --s3-bucket $S3_BUCKET --s3-key kotlin-compiler-server/playground-server-0.11.0.zip
